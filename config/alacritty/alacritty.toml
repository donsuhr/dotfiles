[general]
import = [
    "~/.config/alacritty/themes/themes/nord.toml"
]

[[keyboard.bindings]]
key = "Return"
mods = "Command"
action = "ToggleSimpleFullscreen"

[env]
ITERM_PROFILE = 'dark'

[font]
size = 13.0
offset.y = 2
offset.x = 1

[font.bold]
family = "RobotoMono Nerd Font"
style = "Bold"

[font.bold_italic]
family = "RobotoMono Nerd Font"
style = "Bold Italic"

[font.italic]
family = "RobotoMono Nerd Font"
style = "Italic"

[font.normal]
family = "RobotoMono Nerd Font"
style = "Light"
